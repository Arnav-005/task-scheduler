# Activate with SPRING_PROFILES_ACTIVE=prod (or -Dspring.profiles.active=prod)
# All values below come from environment variables set on the host
# (Railway/Render dashboard, or your own shell) - nothing sensitive is committed here.

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# H2 console has no place in prod
spring.h2.console.enabled=false

gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models
gemini.model=${GEMINI_MODEL:gemini-3.1-flash-lite}
