spring.application.name=taskscheduler
spring.config.import=optional:file:.env[.properties]
# --- Database (dev) ---
# File-based H2 so your tasks/logs/chat survive an app restart.
# Switch to the "prod" profile (see application-prod.properties) for Postgres.
spring.datasource.url=jdbc:h2:file:./data/taskschedulerdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 web console at http://localhost:8080/h2-console
# JDBC URL to paste in when it asks: jdbc:h2:file:./data/taskschedulerdb
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Gemini API ---
# Never hardcode the key - it's read from the GEMINI_API_KEY environment variable.
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models
gemini.model=${GEMINI_MODEL:gemini-3.1-flash-lite}
